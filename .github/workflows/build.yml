name: Full DevOps Pipeline

# 🔥 Fix Node 24 warning (global level)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    env:
      DOCKER_USER: surya8442
      IMAGE_NAME: sliding-block-puzzle-game
      IMAGE_TAG: v1

    steps:

    # 🔹 Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🔹 Setup Node
    - name: Setup NodeJS
      uses: actions/setup-node@v5
      with:
        node-version: 20   # updated from 18

    # 🔹 Install Dependencies
    - name: Install Dependencies
      run: npm install

    # 🔹 Build Application
    - name: Build Application
      run: npm run build

    # 🔹 SonarQube Scan
    - name: SonarQube Scan
      run: |
        npm install -g sonar-scanner
        sonar-scanner \
          -Dsonar.projectKey=puzzlegame \
          -Dsonar.sources=src \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    # 🔹 Docker Build
    - name: Build Docker Image
      run: docker build -t $DOCKER_USER/$IMAGE_NAME:$IMAGE_TAG .

    # 🔹 Docker Login
    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 🔹 Push Docker Image
    - name: Push Docker Image
      run: docker push $DOCKER_USER/$IMAGE_NAME:$IMAGE_TAG

    # 🔹 Configure AWS Credentials
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-south-1

    # 🔹 Install kubectl (important fix)
    - name: Install kubectl
      run: |
        curl -o kubectl https://s3.us-west-2.amazonaws.com/amazon-eks/1.27.1/2023-04-19/bin/linux/amd64/kubectl
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    # 🔹 Deploy to Kubernetes
    - name: Deploy to EKS
      run: |
        aws eks update-kubeconfig --region ap-south-1 --name mycluster
        kubectl apply -f deployment.yml
        kubectl apply -f service.yml
