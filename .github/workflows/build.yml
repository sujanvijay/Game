name: Build Node App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Build (Optional)
      run: npm run build --if-present

    - name: Create ZIP
      run: zip -r app.zip . -x "node_modules/*" ".git/*"

    - name: Store Artifact
      uses: actions/upload-artifact@v4
      with:
        name: nodejs-app
        path: app.zip
