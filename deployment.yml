apiVersion: apps/v1
kind: Deployment
metadata:
  name: puzzle-game-deployment
  labels:
    app: puzzle-game
spec:
  replicas: 2
  selector:
    matchLabels:
      app: puzzle-game
  template:
    metadata:
      labels:
        app: puzzle-game
    spec:
      containers:
      - name: puzzle-game
        image: surya8442/puzzle-game:v1   
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
